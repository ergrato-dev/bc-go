<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="520" fill="#1e1e2e"/>

  <!-- Título -->
  <text x="450" y="30" text-anchor="middle" fill="#cdd6f4" font-size="15" font-weight="bold">Arrays vs Slices — Estructura Interna en Go</text>

  <!-- Divisores verticales -->
  <line x1="300" y1="45" x2="300" y2="420" stroke="#45475a" stroke-width="1"/>
  <line x1="600" y1="45" x2="600" y2="420" stroke="#45475a" stroke-width="1"/>

  <!-- ===================== COL 1: ARRAY ===================== -->
  <rect x="12" y="46" width="276" height="24" rx="3" fill="#313244"/>
  <text x="150" y="62" text-anchor="middle" fill="#00ADD8" font-size="12" font-weight="bold">Array — Tipo de Valor</text>

  <!-- Código declaración -->
  <text x="20" y="86" fill="#94e2d5" font-size="11" font-family="'Roboto Mono', 'Courier New', monospace">var nums [5]int</text>
  <text x="20" y="101" fill="#94e2d5" font-size="11" font-family="'Roboto Mono', 'Courier New', monospace">coords := [3]float64{1.0, 2.0, 3.0}</text>
  <text x="20" y="116" fill="#94e2d5" font-size="11" font-family="'Roboto Mono', 'Courier New', monospace">tags := [...]string{"a","b","c"}</text>

  <!-- Celdas de memoria del array [5]int -->
  <text x="20" y="138" fill="#a6e3a1" font-size="11">[5]int en memoria (contigua, stack):</text>
  <rect x="20" y="144" width="42" height="30" rx="2" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="41" y="163" text-anchor="middle" fill="#cdd6f4" font-size="12">10</text>
  <text x="41" y="182" text-anchor="middle" fill="#585b70" font-size="9">[0]</text>

  <rect x="66" y="144" width="42" height="30" rx="2" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="87" y="163" text-anchor="middle" fill="#cdd6f4" font-size="12">20</text>
  <text x="87" y="182" text-anchor="middle" fill="#585b70" font-size="9">[1]</text>

  <rect x="112" y="144" width="42" height="30" rx="2" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="133" y="163" text-anchor="middle" fill="#cdd6f4" font-size="12">30</text>
  <text x="133" y="182" text-anchor="middle" fill="#585b70" font-size="9">[2]</text>

  <rect x="158" y="144" width="42" height="30" rx="2" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="179" y="163" text-anchor="middle" fill="#cdd6f4" font-size="12">40</text>
  <text x="179" y="182" text-anchor="middle" fill="#585b70" font-size="9">[3]</text>

  <rect x="204" y="144" width="42" height="30" rx="2" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="225" y="163" text-anchor="middle" fill="#cdd6f4" font-size="12">50</text>
  <text x="225" y="182" text-anchor="middle" fill="#585b70" font-size="9">[4]</text>

  <!-- Propiedades -->
  <text x="20" y="207" fill="#f9e2af" font-size="11">✓ Tamaño fijo en compilación</text>
  <text x="20" y="223" fill="#f9e2af" font-size="11">✓ Se COPIA completo al asignar</text>
  <text x="20" y="239" fill="#f9e2af" font-size="11">✓ Comparable con ==</text>
  <text x="20" y="255" fill="#f38ba8" font-size="11">✗ No crece dinámicamente</text>

  <!-- Ejemplo copia -->
  <text x="20" y="277" fill="#a6e3a1" font-size="11">Copia independiente:</text>
  <text x="20" y="292" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">a := [3]int{1, 2, 3}</text>
  <text x="20" y="307" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">b := a         // copia total</text>
  <text x="20" y="322" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">b[0] = 99</text>
  <text x="20" y="337" fill="#cdd6f4" font-size="10">a[0] sigue siendo 1 ✓</text>

  <!-- Cuándo usar -->
  <text x="20" y="360" fill="#cba6f7" font-size="11">Cuándo usar array:</text>
  <text x="20" y="376" fill="#cdd6f4" font-size="10">• Tamaño conocido y fijo (RGB, coord)</text>
  <text x="20" y="392" fill="#cdd6f4" font-size="10">• Como clave de mapa (slices no lo son)</text>
  <text x="20" y="408" fill="#cdd6f4" font-size="10">• [3]int ≠ [4]int — son tipos distintos</text>

  <!-- ===================== COL 2: SLICE HEADER ===================== -->
  <rect x="312" y="46" width="276" height="24" rx="3" fill="#313244"/>
  <text x="450" y="62" text-anchor="middle" fill="#00ADD8" font-size="12" font-weight="bold">Slice — Header + Backing Array</text>

  <text x="320" y="86" fill="#94e2d5" font-size="11" font-family="'Roboto Mono', 'Courier New', monospace">s := []int{10, 20, 30, 40, 50}</text>

  <!-- Header del slice -->
  <text x="320" y="105" fill="#cdd6f4" font-size="11">Header (stack) — 3 campos:</text>

  <!-- ptr box -->
  <rect x="320" y="110" width="72" height="34" rx="2" fill="#1a2f3a" stroke="#00ADD8" stroke-width="1.5"/>
  <text x="356" y="122" text-anchor="middle" fill="#585b70" font-size="9">ptr</text>
  <text x="356" y="138" text-anchor="middle" fill="#00ADD8" font-size="11">0x4a1c</text>

  <!-- len box -->
  <rect x="396" y="110" width="72" height="34" rx="2" fill="#1a2f3a" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="432" y="122" text-anchor="middle" fill="#585b70" font-size="9">len</text>
  <text x="432" y="138" text-anchor="middle" fill="#a6e3a1" font-size="14" font-weight="bold">5</text>

  <!-- cap box -->
  <rect x="472" y="110" width="72" height="34" rx="2" fill="#1a2f3a" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="508" y="122" text-anchor="middle" fill="#585b70" font-size="9">cap</text>
  <text x="508" y="138" text-anchor="middle" fill="#f9e2af" font-size="14" font-weight="bold">8</text>

  <!-- Flecha header → backing array -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ADD8"/>
    </marker>
  </defs>
  <line x1="356" y1="144" x2="356" y2="174" stroke="#00ADD8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Backing array -->
  <text x="320" y="192" fill="#cdd6f4" font-size="11">Backing array (heap):</text>

  <rect x="320" y="198" width="36" height="28" rx="2" fill="#2a2a3e" stroke="#585b70" stroke-width="1"/>
  <text x="338" y="216" text-anchor="middle" fill="#cdd6f4" font-size="11">10</text>

  <rect x="360" y="198" width="36" height="28" rx="2" fill="#2a2a3e" stroke="#585b70" stroke-width="1"/>
  <text x="378" y="216" text-anchor="middle" fill="#cdd6f4" font-size="11">20</text>

  <rect x="400" y="198" width="36" height="28" rx="2" fill="#2a2a3e" stroke="#585b70" stroke-width="1"/>
  <text x="418" y="216" text-anchor="middle" fill="#cdd6f4" font-size="11">30</text>

  <rect x="440" y="198" width="36" height="28" rx="2" fill="#2a2a3e" stroke="#585b70" stroke-width="1"/>
  <text x="458" y="216" text-anchor="middle" fill="#cdd6f4" font-size="11">40</text>

  <rect x="480" y="198" width="36" height="28" rx="2" fill="#2a2a3e" stroke="#585b70" stroke-width="1"/>
  <text x="498" y="216" text-anchor="middle" fill="#cdd6f4" font-size="11">50</text>

  <!-- Capacidad extra (vacía) -->
  <rect x="520" y="198" width="36" height="28" rx="2" fill="#181825" stroke="#45475a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="538" y="216" text-anchor="middle" fill="#45475a" font-size="11">0</text>

  <rect x="560" y="198" width="36" height="28" rx="2" fill="#181825" stroke="#45475a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="578" y="216" text-anchor="middle" fill="#45475a" font-size="11">0</text>

  <rect x="600" y="198" width="36" height="28" rx="2" fill="#181825" stroke="#45475a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="618" y="216" text-anchor="middle" fill="#45475a" font-size="11">0</text>

  <!-- Etiquetas len y cap -->
  <text x="406" y="240" text-anchor="middle" fill="#a6e3a1" font-size="10">← len=5 →</text>
  <text x="468" y="253" text-anchor="middle" fill="#f9e2af" font-size="10">←—— cap=8 ——→</text>

  <!-- Propiedades slice -->
  <text x="320" y="278" fill="#f9e2af" font-size="11">✓ Referencia al backing array</text>
  <text x="320" y="294" fill="#f9e2af" font-size="11">✓ Crece con append — puede reubicar</text>
  <text x="320" y="310" fill="#f9e2af" font-size="11">✓ Copia del header (ptr/len/cap)</text>
  <text x="320" y="326" fill="#f38ba8" font-size="11">✗ No comparable con == (solo nil)</text>

  <!-- nil slice -->
  <text x="320" y="350" fill="#a6e3a1" font-size="11">nil slice — válido en Go:</text>
  <text x="320" y="366" fill="#94e2d5" font-size="11" font-family="'Roboto Mono', 'Courier New', monospace">var s []int  // ptr=nil, len=0, cap=0</text>
  <text x="320" y="382" fill="#cdd6f4" font-size="10">append(s, 1) funciona sobre nil ✓</text>
  <text x="320" y="398" fill="#cdd6f4" font-size="10">len(s)==0 y s==nil son true ✓</text>

  <!-- ===================== COL 3: CREACIÓN ===================== -->
  <rect x="612" y="46" width="276" height="24" rx="3" fill="#313244"/>
  <text x="750" y="62" text-anchor="middle" fill="#00ADD8" font-size="12" font-weight="bold">Crear y Crecer Slices</text>

  <!-- Literal -->
  <rect x="612" y="78" width="276" height="56" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="622" y="93" fill="#cba6f7" font-size="11" font-weight="bold">Literal</text>
  <text x="622" y="109" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">s := []int{1, 2, 3}</text>
  <text x="622" y="125" fill="#a6e3a1" font-size="10">len=3, cap=3 — inmediato</text>

  <!-- make -->
  <rect x="612" y="142" width="276" height="72" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="622" y="157" fill="#cba6f7" font-size="11" font-weight="bold">make(tipo, len, cap)</text>
  <text x="622" y="172" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">s := make([]int, 0, 10) // acumular</text>
  <text x="622" y="187" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">s := make([]int, 5)     // zero vals</text>
  <text x="622" y="203" fill="#a6e3a1" font-size="10">prealocar cuando conoces el tamaño</text>

  <!-- append -->
  <rect x="612" y="222" width="276" height="84" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="622" y="237" fill="#cba6f7" font-size="11" font-weight="bold">append — crece automáticamente</text>
  <text x="622" y="252" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">s = append(s, 4)</text>
  <text x="622" y="267" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">s = append(s, 5, 6, 7)</text>
  <text x="622" y="282" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">s = append(s, otro...)</text>
  <text x="622" y="297" fill="#f38ba8" font-size="10">¡s = append(s,v) — siempre reasignar!</text>

  <!-- copy -->
  <rect x="612" y="314" width="276" height="68" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="622" y="329" fill="#cba6f7" font-size="11" font-weight="bold">copy — slice independiente</text>
  <text x="622" y="344" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">dst := make([]int, len(src))</text>
  <text x="622" y="359" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">copy(dst, src)</text>
  <text x="622" y="374" fill="#a6e3a1" font-size="10">dst y src no comparten backing array</text>

  <!-- ===================== PANEL INFERIOR ===================== -->
  <rect x="10" y="428" width="880" height="82" rx="5" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="450" y="445" text-anchor="middle" fill="#00ADD8" font-size="12" font-weight="bold">Reglas clave para no equivocarse</text>

  <text x="28" y="461" fill="#a6e3a1" font-size="11">📌 Array es tipo valor → copia completa al pasar a función o asignar a variable</text>
  <text x="28" y="477" fill="#f9e2af" font-size="11">📌 Slice copia el header (ptr+len+cap), no el backing array → aliasing posible</text>
  <text x="28" y="493" fill="#f38ba8" font-size="11">📌 append puede crear nuevo backing array → siempre captura el retorno: s = append(s, v)</text>
  <text x="490" y="461" fill="#94e2d5" font-size="11">📌 len ≤ cap siempre; cap puede ser mucho mayor que len</text>
  <text x="490" y="477" fill="#cba6f7" font-size="11">📌 [3]int y [4]int son tipos DISTINTOS e incompatibles</text>
  <text x="490" y="493" fill="#cdd6f4" font-size="11">📌 usa copy(dst, src) para obtener slices verdaderamente independientes</text>
</svg>
