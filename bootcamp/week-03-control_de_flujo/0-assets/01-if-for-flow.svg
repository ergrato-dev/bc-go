<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif">
  <!-- Fondo principal -->
  <rect width="900" height="520" fill="#0d1117"/>

  <!-- Título -->
  <text x="450" y="36" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">Control de Flujo en Go — if y for</text>
  <line x1="60" y1="48" x2="840" y2="48" stroke="#21262d" stroke-width="1"/>

  <!-- ══════════════════════════════════════════
       COLUMNA IZQUIERDA: if / if con init
  ══════════════════════════════════════════ -->
  <rect x="30" y="60" width="260" height="200" rx="6" fill="#0f2535" stroke="#00ADD8" stroke-width="1.2"/>
  <rect x="30" y="60" width="260" height="28" rx="6" fill="#00ADD8"/>
  <text x="160" y="78" fill="#0d1117" font-size="12" font-weight="700" text-anchor="middle">Sentencia if</text>

  <!-- if básico -->
  <text x="44" y="106" fill="#8b949e" font-size="10" font-weight="600">FORMA BÁSICA</text>
  <rect x="40" y="112" width="236" height="46" rx="3" fill="#0d1117"/>
  <text x="50" y="127" fill="#79c0ff" font-size="10" font-family="monospace">if condición {</text>
  <text x="66" y="141" fill="#e6edf3" font-size="10" font-family="monospace">// rama verdadera</text>
  <text x="50" y="155" fill="#79c0ff" font-size="10" font-family="monospace">}</text>

  <!-- separador -->
  <line x1="40" y1="167" x2="278" y2="167" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- if con init -->
  <text x="44" y="182" fill="#ffa657" font-size="10" font-weight="600">CON INICIALIZACIÓN (idiomático)</text>
  <rect x="40" y="188" width="236" height="60" rx="3" fill="#0d1117"/>
  <text x="50" y="203" fill="#79c0ff" font-size="10" font-family="monospace">if v, err := f(); err != nil {</text>
  <text x="66" y="217" fill="#f85149" font-size="10" font-family="monospace">// manejar error</text>
  <text x="50" y="231" fill="#79c0ff" font-size="10" font-family="monospace">} else {</text>
  <text x="66" y="245" fill="#3fb950" font-size="10" font-family="monospace">// usar v aquí</text>
  <text x="50" y="259" fill="#79c0ff" font-size="10" font-family="monospace">}</text>

  <!-- nota scope -->
  <rect x="40" y="268" width="236" height="20" rx="3" fill="#161b22"/>
  <text x="158" y="281" fill="#ffa657" font-size="9" text-anchor="middle">v y err solo existen dentro del if/else</text>

  <!-- ══════════════════════════════════════════
       COLUMNA CENTRAL: 4 patrones de for
  ══════════════════════════════════════════ -->
  <rect x="318" y="60" width="270" height="320" rx="6" fill="#0f2535" stroke="#00ADD8" stroke-width="1.2"/>
  <rect x="318" y="60" width="270" height="28" rx="6" fill="#00ADD8"/>
  <text x="453" y="78" fill="#0d1117" font-size="12" font-weight="700" text-anchor="middle">4 Patrones de for</text>

  <!-- Patrón 1 -->
  <text x="330" y="104" fill="#ffa657" font-size="10" font-weight="700">① Clásico (init; cond; post)</text>
  <rect x="330" y="108" width="244" height="32" rx="3" fill="#0d1117"/>
  <text x="340" y="122" fill="#e6edf3" font-size="10" font-family="monospace">for i := 0; i &lt; n; i++ {</text>
  <text x="340" y="136" fill="#e6edf3" font-size="10" font-family="monospace">}</text>

  <!-- Patrón 2 -->
  <text x="330" y="154" fill="#ffa657" font-size="10" font-weight="700">② While (solo condición)</text>
  <rect x="330" y="158" width="244" height="32" rx="3" fill="#0d1117"/>
  <text x="340" y="172" fill="#e6edf3" font-size="10" font-family="monospace">for condición {</text>
  <text x="340" y="186" fill="#e6edf3" font-size="10" font-family="monospace">}</text>

  <!-- Patrón 3 -->
  <text x="330" y="204" fill="#ffa657" font-size="10" font-weight="700">③ Infinito (sin condición)</text>
  <rect x="330" y="208" width="244" height="32" rx="3" fill="#0d1117"/>
  <text x="340" y="222" fill="#e6edf3" font-size="10" font-family="monospace">for {</text>
  <text x="356" y="236" fill="#e6edf3" font-size="10" font-family="monospace">break <tspan fill="#8b949e">// salida obligatoria</tspan></text>

  <!-- Patrón 4 -->
  <text x="330" y="256" fill="#ffa657" font-size="10" font-weight="700">④ Range (slice / string / map)</text>
  <rect x="330" y="260" width="244" height="48" rx="3" fill="#0d1117"/>
  <text x="340" y="274" fill="#e6edf3" font-size="10" font-family="monospace">for i, v := range colección {</text>
  <text x="356" y="288" fill="#e6edf3" font-size="10" font-family="monospace">// i = índice, v = valor</text>
  <text x="340" y="302" fill="#e6edf3" font-size="10" font-family="monospace">}</text>

  <!-- break / continue -->
  <line x1="330" y1="320" x2="576" y2="320" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="340" y="336" fill="#3fb950" font-size="10" font-family="monospace">break    <tspan fill="#8b949e">// sale del bucle</tspan></text>
  <text x="340" y="352" fill="#3fb950" font-size="10" font-family="monospace">continue <tspan fill="#8b949e">// siguiente iteración</tspan></text>
  <text x="340" y="370" fill="#8b949e" font-size="9">Go 1.22+: cada iteración tiene su propia variable</text>

  <!-- ══════════════════════════════════════════
       COLUMNA DERECHA: for range detalle
  ══════════════════════════════════════════ -->
  <rect x="614" y="60" width="256" height="320" rx="6" fill="#0f2535" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="614" y="60" width="256" height="28" rx="6" fill="#3fb950"/>
  <text x="742" y="78" fill="#0d1117" font-size="12" font-weight="700" text-anchor="middle">range — variantes</text>

  <!-- range slice -->
  <text x="626" y="104" fill="#8b949e" font-size="10" font-weight="600">SLICE</text>
  <rect x="622" y="108" width="238" height="60" rx="3" fill="#0d1117"/>
  <text x="632" y="122" fill="#e6edf3" font-size="10" font-family="monospace">for i, v := range s { }  <tspan fill="#8b949e">// i y v</tspan></text>
  <text x="632" y="136" fill="#e6edf3" font-size="10" font-family="monospace">for i := range s    { }  <tspan fill="#8b949e">// solo i</tspan></text>
  <text x="632" y="150" fill="#e6edf3" font-size="10" font-family="monospace">for _, v := range s { }  <tspan fill="#8b949e">// solo v</tspan></text>
  <text x="632" y="164" fill="#e6edf3" font-size="10" font-family="monospace">for range s         { }  <tspan fill="#8b949e">// contar</tspan></text>

  <!-- range map -->
  <text x="626" y="180" fill="#8b949e" font-size="10" font-weight="600">MAP</text>
  <rect x="622" y="184" width="238" height="32" rx="3" fill="#0d1117"/>
  <text x="632" y="198" fill="#e6edf3" font-size="10" font-family="monospace">for k, v := range m { }  <tspan fill="#8b949e">// clave, valor</tspan></text>
  <text x="632" y="212" fill="#8b949e" font-size="9">Orden NO garantizado</text>

  <!-- range string -->
  <text x="626" y="230" fill="#8b949e" font-size="10" font-weight="600">STRING (itera por runes)</text>
  <rect x="622" y="234" width="238" height="56" rx="3" fill="#0d1117"/>
  <text x="632" y="248" fill="#e6edf3" font-size="10" font-family="monospace">for bytePos, r := range "café" {</text>
  <text x="648" y="262" fill="#e6edf3" font-size="10" font-family="monospace">// r es rune (int32)</text>
  <text x="632" y="276" fill="#e6edf3" font-size="10" font-family="monospace">}</text>
  <text x="632" y="288" fill="#ffa657" font-size="9">bytePos ≠ runePos para UTF-8 multi-byte</text>

  <!-- channel -->
  <text x="626" y="306" fill="#8b949e" font-size="10" font-weight="600">CHANNEL (semanas 14-17)</text>
  <rect x="622" y="310" width="238" height="22" rx="3" fill="#0d1117"/>
  <text x="632" y="325" fill="#8b949e" font-size="10" font-family="monospace">for v := range ch { }  <tspan fill="#21262d">// próximamente</tspan></text>

  <!-- ══════════════════════════════════════════
       PANEL INFERIOR: scope visual
  ══════════════════════════════════════════ -->
  <rect x="30" y="398" width="840" height="100" rx="6" fill="#0f2535" stroke="#21262d" stroke-width="1.2"/>
  <text x="449" y="418" fill="#00ADD8" font-size="12" font-weight="700" text-anchor="middle">Scope de Variables — if con init vs declaración externa</text>

  <rect x="44" y="426" width="380" height="58" rx="4" fill="#0d1117"/>
  <text x="60" y="442" fill="#f85149" font-size="10" font-family="monospace">// ❌ scope innecesariamente amplio</text>
  <text x="60" y="456" fill="#8b949e" font-size="10" font-family="monospace">err := archivo.Read(buf)</text>
  <text x="60" y="470" fill="#8b949e" font-size="10" font-family="monospace">if err != nil { return err }  // err sigue viva</text>

  <rect x="440" y="426" width="415" height="58" rx="4" fill="#0d1117"/>
  <text x="456" y="442" fill="#3fb950" font-size="10" font-family="monospace">// ✅ scope limitado al if</text>
  <text x="456" y="456" fill="#e6edf3" font-size="10" font-family="monospace">if _, err := archivo.Read(buf); err != nil {</text>
  <text x="472" y="470" fill="#e6edf3" font-size="10" font-family="monospace">return err</text>
  <text x="456" y="480" fill="#e6edf3" font-size="10" font-family="monospace">}  // err desaparece aquí</text>
</svg>
