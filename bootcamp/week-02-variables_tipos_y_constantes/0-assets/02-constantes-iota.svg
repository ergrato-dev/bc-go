<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="500" fill="#0d1117"/>

  <!-- Título -->
  <text x="450" y="36" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">Constantes e iota en Go</text>
  <line x1="60" y1="48" x2="840" y2="48" stroke="#21262d" stroke-width="1"/>

  <!-- ══════════════════════════════════════════
       PANEL IZQUIERDO: const básico + tipadas vs no tipadas
  ══════════════════════════════════════════ -->
  <rect x="24" y="58" width="270" height="280" rx="6" fill="#0f2535" stroke="#00ADD8" stroke-width="1.2"/>
  <rect x="24" y="58" width="270" height="26" rx="6" fill="#00ADD8"/>
  <text x="159" y="75" fill="#0d1117" font-size="12" font-weight="700" text-anchor="middle">const — Constantes</text>

  <!-- código const básico -->
  <rect x="34" y="92" width="250" height="110" rx="4" fill="#0d1117"/>
  <text x="44"  y="110" fill="#8b949e" font-size="10" font-family="monospace">// declaración individual</text>
  <text x="44"  y="126" fill="#c9d1d9" font-size="11" font-family="monospace"><tspan fill="#ff7b72">const</tspan> maxRetries = 3</text>
  <text x="44"  y="142" fill="#c9d1d9" font-size="11" font-family="monospace"><tspan fill="#ff7b72">const</tspan> appName   = <tspan fill="#a5d6ff">"bc-go"</tspan></text>
  <text x="44"  y="164" fill="#8b949e" font-size="10" font-family="monospace">// bloque const</text>
  <text x="44"  y="180" fill="#c9d1d9" font-size="11" font-family="monospace"><tspan fill="#ff7b72">const</tspan> (</text>
  <text x="44"  y="196" fill="#c9d1d9" font-size="11" font-family="monospace">    httpOK    = 200</text>

  <!-- tabla tipada vs no tipada -->
  <text x="34" y="224" fill="#8b949e" font-size="10" font-weight="600">TIPADA</text>
  <text x="160" y="224" fill="#8b949e" font-size="10" font-weight="600">NO TIPADA</text>
  <line x1="34" y1="228" x2="284" y2="228" stroke="#21262d" stroke-width="1"/>

  <rect x="34"  y="234" width="108" height="50" rx="3" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="88"  y="250" fill="#f85149" font-size="10" text-anchor="middle">const x int32 = 100</text>
  <text x="88"  y="266" fill="#8b949e" font-size="9" text-anchor="middle">solo compatible con</text>
  <text x="88"  y="278" fill="#8b949e" font-size="9" text-anchor="middle">int32 exacto</text>

  <rect x="156" y="234" width="108" height="50" rx="3" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="210" y="250" fill="#3fb950" font-size="10" text-anchor="middle">const x = 100</text>
  <text x="210" y="266" fill="#8b949e" font-size="9" text-anchor="middle">compatible con</text>
  <text x="210" y="278" fill="#8b949e" font-size="9" text-anchor="middle">cualquier int/float</text>

  <text x="34" y="308" fill="#8b949e" font-size="9">✱ Preferir no tipadas para mayor flexibilidad</text>
  <text x="34" y="322" fill="#8b949e" font-size="9">  Usar tipadas cuando el tipo importa (enums)</text>

  <!-- ══════════════════════════════════════════
       PANEL CENTRAL: iota - flujo visual
  ══════════════════════════════════════════ -->
  <rect x="312" y="58" width="280" height="280" rx="6" fill="#0f2535" stroke="#ffa657" stroke-width="1.5"/>
  <rect x="312" y="58" width="280" height="26" rx="6" fill="#ffa657"/>
  <text x="452" y="75" fill="#0d1117" font-size="12" font-weight="700" text-anchor="middle">iota — Contador Automático</text>

  <!-- código iota con flechas -->
  <rect x="322" y="92" width="260" height="228" rx="4" fill="#0d1117"/>

  <!-- línea const( -->
  <text x="334" y="112" fill="#ff7b72" font-size="11" font-family="monospace">const (</text>
  <!-- flecha iota=0 -->
  <text x="334" y="132" fill="#c9d1d9" font-size="11" font-family="monospace">    Sunday <tspan fill="#ff7b72">Weekday</tspan> = <tspan fill="#ffa657">iota</tspan></text>
  <rect x="520" y="122" width="52" height="16" rx="3" fill="#1f3d1a"/>
  <text x="546" y="133" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">= 0</text>
  <line x1="518" y1="130" x2="502" y2="130" stroke="#3fb950" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <text x="334" y="152" fill="#c9d1d9" font-size="11" font-family="monospace">    Monday</text>
  <rect x="520" y="142" width="52" height="16" rx="3" fill="#1f3d1a"/>
  <text x="546" y="153" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">= 1</text>
  <line x1="518" y1="150" x2="502" y2="150" stroke="#3fb950" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <text x="334" y="172" fill="#c9d1d9" font-size="11" font-family="monospace">    Tuesday</text>
  <rect x="520" y="162" width="52" height="16" rx="3" fill="#1f3d1a"/>
  <text x="546" y="173" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">= 2</text>
  <line x1="518" y1="170" x2="502" y2="170" stroke="#3fb950" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <text x="334" y="192" fill="#c9d1d9" font-size="11" font-family="monospace">    Wednesday</text>
  <rect x="520" y="182" width="52" height="16" rx="3" fill="#1f3d1a"/>
  <text x="546" y="193" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">= 3</text>
  <line x1="518" y1="190" x2="502" y2="190" stroke="#3fb950" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <text x="334" y="212" fill="#c9d1d9" font-size="11" font-family="monospace">    Thursday</text>
  <rect x="520" y="202" width="52" height="16" rx="3" fill="#1f3d1a"/>
  <text x="546" y="213" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">= 4</text>

  <text x="334" y="232" fill="#c9d1d9" font-size="11" font-family="monospace">    Friday</text>
  <rect x="520" y="222" width="52" height="16" rx="3" fill="#1f3d1a"/>
  <text x="546" y="233" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">= 5</text>

  <text x="334" y="252" fill="#c9d1d9" font-size="11" font-family="monospace">    Saturday</text>
  <rect x="520" y="242" width="52" height="16" rx="3" fill="#1f3d1a"/>
  <text x="546" y="253" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">= 6</text>

  <text x="334" y="272" fill="#ff7b72" font-size="11" font-family="monospace">)</text>

  <!-- nota reset -->
  <text x="334" y="296" fill="#8b949e" font-size="9">iota se reinicia a 0 en cada bloque const</text>
  <text x="334" y="308" fill="#8b949e" font-size="9">type Weekday int → seguridad de tipos</text>

  <!-- ══════════════════════════════════════════
       PANEL DERECHO: iota con bits
  ══════════════════════════════════════════ -->
  <rect x="610" y="58" width="270" height="280" rx="6" fill="#0f2535" stroke="#bc8cff" stroke-width="1.5"/>
  <rect x="610" y="58" width="270" height="26" rx="6" fill="#bc8cff"/>
  <text x="745" y="75" fill="#0d1117" font-size="12" font-weight="700" text-anchor="middle">iota con 1 &lt;&lt; iota (Flags)</text>

  <!-- código bits -->
  <rect x="620" y="92" width="250" height="180" rx="4" fill="#0d1117"/>
  <text x="632" y="110" fill="#ff7b72" font-size="11" font-family="monospace">const (</text>
  <text x="632" y="128" fill="#c9d1d9" font-size="11" font-family="monospace">    Read    = <tspan fill="#ffa657">1 &lt;&lt; iota</tspan></text>
  <text x="632" y="144" fill="#c9d1d9" font-size="11" font-family="monospace">    Write</text>
  <text x="632" y="160" fill="#c9d1d9" font-size="11" font-family="monospace">    Execute</text>
  <text x="632" y="176" fill="#ff7b72" font-size="11" font-family="monospace">)</text>

  <!-- tabla de bits -->
  <text x="632"  y="200" fill="#8b949e" font-size="10">Constante</text>
  <text x="710"  y="200" fill="#8b949e" font-size="10">Valor</text>
  <text x="750"  y="200" fill="#8b949e" font-size="10">Binario</text>
  <line x1="628" y1="204" x2="860" y2="204" stroke="#21262d" stroke-width="1"/>
  <text x="632"  y="220" fill="#79c0ff" font-size="11" font-family="monospace">Read</text>
  <text x="710"  y="220" fill="#3fb950" font-size="11" font-family="monospace">1</text>
  <text x="750"  y="220" fill="#ffa657" font-size="11" font-family="monospace">0b0001</text>
  <text x="632"  y="238" fill="#79c0ff" font-size="11" font-family="monospace">Write</text>
  <text x="710"  y="238" fill="#3fb950" font-size="11" font-family="monospace">2</text>
  <text x="750"  y="238" fill="#ffa657" font-size="11" font-family="monospace">0b0010</text>
  <text x="632"  y="256" fill="#79c0ff" font-size="11" font-family="monospace">Execute</text>
  <text x="710"  y="256" fill="#3fb950" font-size="11" font-family="monospace">4</text>
  <text x="750"  y="256" fill="#ffa657" font-size="11" font-family="monospace">0b0100</text>

  <!-- combinación OR -->
  <rect x="620" y="276" width="250" height="50" rx="4" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="745" y="292" fill="#bc8cff" font-size="10" text-anchor="middle">Combinar permisos con OR:</text>
  <text x="745" y="308" fill="#e6edf3" font-size="11" font-family="monospace" text-anchor="middle">user := Read | Write  // = 3</text>
  <text x="745" y="320" fill="#8b949e" font-size="9" text-anchor="middle">verificar: user &amp; Execute != 0</text>

  <!-- ══════════════════════════════════════════
       PANEL INFERIOR: iota skip + comparativa
  ══════════════════════════════════════════ -->
  <rect x="24" y="354" width="856" height="116" rx="6" fill="#0f2535" stroke="#21262d" stroke-width="1.2"/>
  <text x="452" y="374" fill="#00ADD8" font-size="12" font-weight="700" text-anchor="middle">Patrones comunes con iota</text>

  <!-- Patrón 1: skip con _ -->
  <rect x="34" y="382" width="260" height="80" rx="4" fill="#0d1117"/>
  <text x="44" y="398" fill="#8b949e" font-size="10">Saltar el cero (zero = sin asignar):</text>
  <text x="44" y="414" fill="#c9d1d9" font-size="10" font-family="monospace"><tspan fill="#ff7b72">const</tspan> (</text>
  <text x="44" y="430" fill="#c9d1d9" font-size="10" font-family="monospace">    _          = iota <tspan fill="#8b949e">// 0 descartado</tspan></text>
  <text x="44" y="446" fill="#c9d1d9" font-size="10" font-family="monospace">    PriorityLow = iota <tspan fill="#3fb950">// 1</tspan></text>
  <text x="44" y="458" fill="#c9d1d9" font-size="10" font-family="monospace">)</text>

  <!-- Patrón 2: desde 1 con + -->
  <rect x="310" y="382" width="260" height="80" rx="4" fill="#0d1117"/>
  <text x="320" y="398" fill="#8b949e" font-size="10">Empezar desde 1 con expresión:</text>
  <text x="320" y="414" fill="#c9d1d9" font-size="10" font-family="monospace"><tspan fill="#ff7b72">const</tspan> (</text>
  <text x="320" y="430" fill="#c9d1d9" font-size="10" font-family="monospace">    A = iota + 1  <tspan fill="#3fb950">// 1</tspan></text>
  <text x="320" y="446" fill="#c9d1d9" font-size="10" font-family="monospace">    B              <tspan fill="#3fb950">// 2</tspan></text>
  <text x="320" y="458" fill="#c9d1d9" font-size="10" font-family="monospace">)</text>

  <!-- Patrón 3: multiplicación -->
  <rect x="586" y="382" width="284" height="80" rx="4" fill="#0d1117"/>
  <text x="596" y="398" fill="#8b949e" font-size="10">Multiplicar (KB, MB, GB):</text>
  <text x="596" y="414" fill="#c9d1d9" font-size="10" font-family="monospace"><tspan fill="#ff7b72">const</tspan> (</text>
  <text x="596" y="430" fill="#c9d1d9" font-size="10" font-family="monospace">    KB = 1 &lt;&lt; (10 * (iota + 1))  <tspan fill="#3fb950">// 1024</tspan></text>
  <text x="596" y="446" fill="#c9d1d9" font-size="10" font-family="monospace">    MB                            <tspan fill="#3fb950">// 1048576</tspan></text>
  <text x="596" y="458" fill="#c9d1d9" font-size="10" font-family="monospace">)</text>

  <!-- marcadores de flechas -->
  <defs>
    <marker id="arrowGreen" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3fb950"/>
    </marker>
  </defs>
</svg>
