<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="520" fill="#1e1e2e"/>

  <!-- Título -->
  <text x="450" y="30" text-anchor="middle" fill="#cdd6f4" font-size="15" font-weight="bold">Structs en Go — Tipos de Valor, Métodos y Composición</text>

  <!-- Divisores -->
  <line x1="300" y1="45" x2="300" y2="420" stroke="#45475a" stroke-width="1"/>
  <line x1="600" y1="45" x2="600" y2="420" stroke="#45475a" stroke-width="1"/>

  <!-- ===================== COL 1: DEFINICIÓN Y MEMORIA ===================== -->
  <rect x="12" y="46" width="276" height="24" rx="3" fill="#313244"/>
  <text x="150" y="62" text-anchor="middle" fill="#00ADD8" font-size="12" font-weight="bold">Definición y memoria</text>

  <!-- Definición -->
  <text x="20" y="82" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">type Libro struct {</text>
  <text x="20" y="96" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    ID       int</text>
  <text x="20" y="110" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Titulo   string</text>
  <text x="20" y="124" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Paginas  int</text>
  <text x="20" y="138" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Activo   bool</text>
  <text x="20" y="152" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">}</text>

  <!-- Memoria del struct (contigua) -->
  <text x="20" y="174" fill="#a6e3a1" font-size="11">Campos contiguos en memoria:</text>

  <rect x="20" y="180" width="50" height="24" rx="2" fill="#1a2f3a" stroke="#00ADD8" stroke-width="1"/>
  <text x="45" y="196" text-anchor="middle" fill="#00ADD8" font-size="10">ID: 1</text>

  <rect x="74" y="180" width="80" height="24" rx="2" fill="#1a2f3a" stroke="#00ADD8" stroke-width="1"/>
  <text x="114" y="196" text-anchor="middle" fill="#00ADD8" font-size="10">Titulo: "Go"</text>

  <rect x="158" y="180" width="54" height="24" rx="2" fill="#1a2f3a" stroke="#00ADD8" stroke-width="1"/>
  <text x="185" y="196" text-anchor="middle" fill="#00ADD8" font-size="10">Pag: 400</text>

  <rect x="216" y="180" width="46" height="24" rx="2" fill="#1a2f3a" stroke="#00ADD8" stroke-width="1"/>
  <text x="239" y="196" text-anchor="middle" fill="#00ADD8" font-size="10">Act: T</text>

  <!-- Zero value -->
  <text x="20" y="224" fill="#f9e2af" font-size="11">Zero value — campos inicializados:</text>
  <text x="20" y="240" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">var l Libro</text>
  <text x="20" y="255" fill="#cdd6f4" font-size="10">→ ID=0, Titulo="", Paginas=0, Activo=false</text>

  <!-- Literal con campos -->
  <text x="20" y="278" fill="#a6e3a1" font-size="11">Literal con nombres (siempre):</text>
  <text x="20" y="293" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">l := Libro{</text>
  <text x="20" y="308" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    ID:      1,</text>
  <text x="20" y="323" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Titulo:  "The Go PL",</text>
  <text x="20" y="338" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Paginas: 380,</text>
  <text x="20" y="353" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">}</text>

  <!-- Acceso -->
  <text x="20" y="376" fill="#cba6f7" font-size="11">Acceso a campos con punto:</text>
  <text x="20" y="391" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">fmt.Println(l.Titulo) // "The Go PL"</text>
  <text x="20" y="406" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">l.Activo = true</text>

  <!-- ===================== COL 2: SEMÁNTICA DE VALOR Y MÉTODOS ===================== -->
  <rect x="312" y="46" width="276" height="24" rx="3" fill="#313244"/>
  <text x="450" y="62" text-anchor="middle" fill="#00ADD8" font-size="12" font-weight="bold">Semántica de valor y métodos</text>

  <!-- Semántica de valor -->
  <rect x="312" y="76" width="276" height="82" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="322" y="91" fill="#cba6f7" font-size="11" font-weight="bold">Structs son tipos de valor</text>
  <text x="322" y="106" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">a := Libro{ID: 1, Titulo: "Go"}</text>
  <text x="322" y="120" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">b := a           // copia completa</text>
  <text x="322" y="134" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">b.Titulo = "Rust"</text>
  <text x="322" y="148" fill="#cdd6f4" font-size="10">a.Titulo sigue siendo "Go" ✓</text>

  <!-- Comparación -->
  <rect x="312" y="166" width="276" height="68" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="322" y="181" fill="#cba6f7" font-size="11" font-weight="bold">Comparación con ==</text>
  <text x="322" y="196" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">a := Libro{ID: 1, Titulo: "Go"}</text>
  <text x="322" y="210" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">b := Libro{ID: 1, Titulo: "Go"}</text>
  <text x="322" y="224" fill="#cdd6f4" font-size="10">a == b → true (todos los campos iguales)</text>

  <!-- Método de valor -->
  <rect x="312" y="242" width="276" height="90" rx="3" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="322" y="257" fill="#a6e3a1" font-size="11" font-weight="bold">Método de valor — receptor (l Libro)</text>
  <text x="322" y="272" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">func (l Libro) Resumen() string {</text>
  <text x="322" y="286" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    return fmt.Sprintf("[%d] %s",</text>
  <text x="322" y="300" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">        l.ID, l.Titulo)</text>
  <text x="322" y="314" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">}</text>
  <text x="322" y="328" fill="#cdd6f4" font-size="10">l.Resumen() → "[1] The Go PL"</text>

  <!-- Método de puntero -->
  <rect x="312" y="340" width="276" height="70" rx="3" fill="#181825" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="322" y="355" fill="#f9e2af" font-size="11" font-weight="bold">Método de puntero — receptor (*Libro)</text>
  <text x="322" y="370" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">func (l *Libro) Activar() {</text>
  <text x="322" y="384" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    l.Activo = true // modifica original</text>
  <text x="322" y="398" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">}</text>
  <text x="322" y="412" fill="#a6e3a1" font-size="10">Semana 07 — Punteros lo explicará en detalle</text>

  <!-- ===================== COL 3: COMPOSICIÓN ===================== -->
  <rect x="612" y="46" width="276" height="24" rx="3" fill="#313244"/>
  <text x="750" y="62" text-anchor="middle" fill="#00ADD8" font-size="12" font-weight="bold">Composición de structs</text>

  <!-- Struct anónimo inline -->
  <rect x="612" y="76" width="276" height="70" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="622" y="91" fill="#cba6f7" font-size="11" font-weight="bold">Struct anónimo (inline)</text>
  <text x="622" y="106" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">config := struct {</text>
  <text x="622" y="120" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Host string</text>
  <text x="622" y="134" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Port int</text>
  <text x="622" y="140" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">}{"localhost", 8080}</text>

  <!-- Struct como campo -->
  <rect x="612" y="154" width="276" height="90" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="622" y="169" fill="#cba6f7" font-size="11" font-weight="bold">Struct como campo (composición)</text>
  <text x="622" y="184" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">type Direccion struct {</text>
  <text x="622" y="198" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Ciudad string</text>
  <text x="622" y="212" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Pais   string</text>
  <text x="622" y="226" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">}</text>
  <text x="622" y="240" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">type Autor struct { Dir Direccion }</text>

  <!-- Slice de structs -->
  <rect x="612" y="252" width="276" height="72" rx="3" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="622" y="267" fill="#a6e3a1" font-size="11" font-weight="bold">Slice + Map de structs</text>
  <text x="622" y="282" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">catalogo := []Libro{}</text>
  <text x="622" y="296" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">indice   := map[int]Libro{}</text>
  <text x="622" y="310" fill="#cdd6f4" font-size="10">slice → orden · map → búsqueda O(1)</text>
  <text x="622" y="318" fill="#a6e3a1" font-size="10">Patrón central del proyecto semana 06</text>

  <!-- Campos exportados vs no exportados -->
  <rect x="612" y="332" width="276" height="78" rx="3" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="622" y="347" fill="#cba6f7" font-size="11" font-weight="bold">Exportado vs no exportado</text>
  <text x="622" y="362" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">type Producto struct {</text>
  <text x="622" y="376" fill="#a6e3a1" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    Nombre string  // exportado (PascalCase)</text>
  <text x="622" y="390" fill="#585b70" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">    precio float64 // no exportado (camelCase)</text>
  <text x="622" y="404" fill="#94e2d5" font-size="10" font-family="'Roboto Mono', 'Courier New', monospace">}</text>

  <!-- ===================== PANEL INFERIOR ===================== -->
  <rect x="10" y="428" width="880" height="82" rx="5" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="450" y="445" text-anchor="middle" fill="#00ADD8" font-size="12" font-weight="bold">Diferencias clave: struct vs map</text>

  <text x="28" y="461" fill="#a6e3a1" font-size="11">📌 struct: tipos fijos en compilación, acceso por nombre de campo (dot notation)</text>
  <text x="28" y="477" fill="#f9e2af" font-size="11">📌 map: claves dinámicas en ejecución, acceso por valor de clave</text>
  <text x="28" y="493" fill="#cba6f7" font-size="11">📌 struct copia sus campos al asignar; map copia solo el descriptor (referencia)</text>
  <text x="490" y="461" fill="#94e2d5" font-size="11">📌 struct es comparable con == si todos sus campos lo son</text>
  <text x="490" y="477" fill="#f38ba8" font-size="11">📌 map NO es comparable con == (solo con nil)</text>
  <text x="490" y="493" fill="#cdd6f4" font-size="11">📌 PascalCase = exportado; camelCase = solo accesible en el mismo paquete</text>
</svg>
