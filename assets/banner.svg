<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="300" viewBox="0 0 1200 300"
     role="img" aria-label="bc-go — Bootcamp Go: Zero to Hero">

  <defs>
    <!-- Patrón de puntos decorativos: refuerza la estética tech del banner -->
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#00ADD8" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- ── Fondos ──────────────────────────────────────────── -->
  <rect width="1200" height="300" fill="#0d1117"/>
  <!-- Puntos visibles sólo en el área de texto (los paneles laterales los tapan) -->
  <rect width="1200" height="300" fill="url(#dotgrid)"/>
  <!-- Panel izquierdo — área del Gopher -->
  <rect x="5" y="0" width="275" height="300" fill="#080f1a"/>
  <!-- Panel derecho — área de código decorativo -->
  <rect x="820" y="0" width="375" height="300" fill="#080f1a"/>

  <!-- Barras de acento Go (azul oficial #00ADD8) -->
  <rect x="0"    y="0" width="5" height="300" fill="#00ADD8"/>
  <rect x="1195" y="0" width="5" height="300" fill="#00ADD8"/>

  <!-- ══ GOPHER ═════════════════════════════════════════════
       Mascota oficial de Go — figura geométrica simplificada.
       Elementos en orden de capas: orejas → cuerpo → hocico → ojos → detalles
  ═══════════════════════════════════════════════════════════ -->

  <!-- Orejas: círculo exterior (#00ADD8) + hueco interior del panel -->
  <circle cx="95"  cy="66" r="28" fill="#00ADD8"/>
  <circle cx="95"  cy="66" r="16" fill="#080f1a"/>
  <circle cx="185" cy="66" r="28" fill="#00ADD8"/>
  <circle cx="185" cy="66" r="16" fill="#080f1a"/>

  <!-- Cabeza y cuerpo: elipse principal en azul Go -->
  <ellipse cx="140" cy="165" rx="90" ry="95" fill="#00ADD8"/>

  <!-- Hocico (muzzle): tono más claro para contraste facial -->
  <ellipse cx="140" cy="203" rx="52" ry="34" fill="#7ED4E8"/>

  <!-- Ojos: esclera blanca — característica más reconocible del Gopher -->
  <circle cx="112" cy="148" r="26" fill="#ffffff"/>
  <circle cx="168" cy="148" r="26" fill="#ffffff"/>

  <!-- Pupilas: color oscuro, ligeramente descentradas para dar expresividad -->
  <circle cx="118" cy="152" r="13" fill="#0d1117"/>
  <circle cx="174" cy="152" r="13" fill="#0d1117"/>

  <!-- Brillos: pequeño reflejo de luz; da vida y profundidad a los ojos -->
  <circle cx="111" cy="143" r="5" fill="#ffffff"/>
  <circle cx="167" cy="143" r="5" fill="#ffffff"/>

  <!-- Nariz: óvalo en azul oscuro sobre el hocico -->
  <ellipse cx="140" cy="193" rx="9" ry="6" fill="#005f73"/>

  <!-- Sonrisa: arco cuadrático suave — el Gopher siempre está feliz 🐹 -->
  <path d="M 125 212 Q 140 228 155 212"
        stroke="#005f73" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ══ TEXTO PRINCIPAL ════════════════════════════════════ -->

  <!-- Etiqueta de contexto: pequeña, con tracking alto para legibilidad a distancia -->
  <text x="300" y="62"
        font-family="Inter, 'Roboto', 'Open Sans', sans-serif"
        font-size="12" font-weight="600"
        fill="#00ADD8" letter-spacing="5">BOOTCAMP · BC-GO</text>

  <!-- Título principal: "Bootcamp" en blanco, "Go" en azul oficial -->
  <!-- font-size 78 domina la jerarquía visual del banner -->
  <text x="297" y="178"
        font-family="Inter, 'Roboto', 'Open Sans', sans-serif"
        font-size="78" font-weight="800"><tspan fill="#e6edf3">Bootcamp </tspan><tspan fill="#00ADD8">Go</tspan></text>

  <!-- Línea decorativa: separa título de subtítulo con el color de marca -->
  <rect x="300" y="194" width="500" height="3" rx="2" fill="#00ADD8"/>

  <!-- Subtítulo: promesa del curso en weight ligero para contraste tipográfico -->
  <text x="302" y="232"
        font-family="Inter, 'Roboto', sans-serif"
        font-size="20" font-weight="300"
        fill="#e6edf3" letter-spacing="1">Zero to Hero</text>

  <!-- Estadísticas del bootcamp: datos concretos en gris secundario -->
  <text x="302" y="265"
        font-family="Inter, 'Roboto', sans-serif"
        font-size="13"
        fill="#7d8590" letter-spacing="1">Go 1.24+  ·  20 semanas  ·  160 horas  ·  8 h/semana</text>

  <!-- ══ CÓDIGO DECORATIVO ══════════════════════════════════
       Hello World de Go — guiño visual al primer programa que escribe
       todo estudiante. Opacidad baja: es textura, no contenido principal.
  ═══════════════════════════════════════════════════════════ -->
  <g opacity="0.35"
     font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
     font-size="13">
    <!-- Comentario — gris apagado -->
    <text x="848" y="88"  fill="#6e7681">// Semana 01 — ¡Hola, Gopher!</text>
    <!-- package main — keyword en rojo-naranja -->
    <text x="848" y="112" fill="#e6edf3"><tspan fill="#ff7b72">package</tspan> main</text>
    <!-- import "fmt" — keyword + string -->
    <text x="848" y="150" fill="#e6edf3"><tspan fill="#ff7b72">import</tspan><tspan fill="#a5d6ff"> "fmt"</tspan></text>
    <!-- func main() { — keyword + función + código -->
    <text x="848" y="174" fill="#e6edf3"><tspan fill="#ff7b72">func</tspan><tspan fill="#d2a8ff"> main</tspan><tspan fill="#e6edf3">() {</tspan></text>
    <!-- Llamada a función (4 espacios de indentación) -->
    <text x="878" y="198" fill="#e6edf3">fmt.Println(</text>
    <!-- String literal (8 espacios de indentación) -->
    <text x="908" y="220" fill="#a5d6ff">"¡Hola, Gopher!"</text>
    <!-- Cierre de llamada -->
    <text x="878" y="242" fill="#e6edf3">)</text>
    <!-- Cierre de función -->
    <text x="848" y="266" fill="#e6edf3">}</text>
  </g>

</svg>
